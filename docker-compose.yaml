services:
  postgres:
    image: postgres:16-alpine
    container_name: reactive-store-postgres
    environment:
      POSTGRES_DB: store
      POSTGRES_USER: database_user
      POSTGRES_PASSWORD: netec123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U database_user -d store"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: